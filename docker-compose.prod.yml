services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${DOCKERHUB_USERNAME}/blog-api:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - uploads:/uploads

  nginx:
    image: ${DOCKERHUB_USERNAME}/blog-nginx:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - uploads:/uploads:ro
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
