# CI/CD pipeline: test → build image → push to Heroku Container Registry → release
#
# ── Required GitHub repository secrets ────────────────────────────────────────
#   HEROKU_API_KEY    Your Heroku API key
#                     → heroku.com → Avatar → Account Settings → API Key → Reveal
#   HEROKU_APP_NAME   Your Heroku app name (e.g. "my-blog")
#                     → the subdomain in https://<app-name>.herokuapp.com
#
# ── First-time Heroku setup (run once from your machine) ─────────────────────
#   Install CLI: https://devcenter.heroku.com/articles/heroku-cli
#
#   heroku login
#   heroku create <app-name>
#
#   # Attach Postgres ($5/month Essential-0 plan)
#   heroku addons:create heroku-postgresql:essential-0 -a <app-name>
#   # DATABASE_URL is now set automatically — no action needed.
#
#   # Set required config vars
#   heroku config:set JWT_SECRET=$(openssl rand -hex 32) -a <app-name>
#
#   # (Optional) Cloudinary for persistent image uploads
#   heroku config:set \
#     CLOUDINARY_CLOUD_NAME=<cloud> \
#     CLOUDINARY_API_KEY=<key> \
#     CLOUDINARY_API_SECRET=<secret> \
#     -a <app-name>
#
#   # Switch to Container stack so Heroku accepts Docker images
#   heroku stack:set container -a <app-name>
#
# ── HTTPS / TLS ───────────────────────────────────────────────────────────────
#   Heroku's Automated Certificate Management (ACM) provides free Let's Encrypt
#   TLS on all paid dynos — no cert-manager or manual renewal needed.
#
#   # Add your custom domain first
#   heroku domains:add www.yourdomain.com -a <app-name>
#   # Point your DNS CNAME to the value shown by the command above.
#
#   # Then enable ACM (free on Basic dyno and above)
#   heroku certs:auto:enable -a <app-name>
#   heroku certs:auto -a <app-name>   # check status
#
#   The *.herokuapp.com domain is always HTTPS — no extra steps required.
#
# ── Running migrations ────────────────────────────────────────────────────────
#   Migrations are NOT run automatically. After deploying a schema change run:
#     heroku run ./migrate -a <app-name>
#   All SQL files use IF NOT EXISTS so re-running is always safe.
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  # ── 2. Build, push to Heroku Container Registry, and release ─────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      APP: ${{ secrets.HEROKU_APP_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        run: echo "$HEROKU_API_KEY" | docker login registry.heroku.com -u _ --password-stdin

      - name: Build image
        run: |
          docker build \
            -f Dockerfile.heroku \
            -t registry.heroku.com/$APP/web \
            .

      - name: Push image
        run: docker push registry.heroku.com/$APP/web

      - name: Release
        run: |
          IMAGE_ID=$(docker inspect --format='{{.Id}}' registry.heroku.com/$APP/web)
          curl -sf -X PATCH \
            https://api.heroku.com/apps/$APP/formation \
            -d "{\"updates\":[{\"type\":\"web\",\"docker_image\":\"$IMAGE_ID\"}]}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer $HEROKU_API_KEY"
