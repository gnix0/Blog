name: CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  # ── 2. Build, push to Heroku Container Registry, and release ─────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      APP: ${{ secrets.HEROKU_APP_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        run: echo "$HEROKU_API_KEY" | docker login registry.heroku.com -u _ --password-stdin

      - name: Build image
        run: |
          docker build \
            -f Dockerfile.heroku \
            -t registry.heroku.com/$APP/web \
            .

      - name: Push image
        run: docker push registry.heroku.com/$APP/web

      - name: Release
        run: |
          IMAGE_ID=$(docker inspect --format='{{.Id}}' registry.heroku.com/$APP/web)
          curl -sf -X PATCH \
            https://api.heroku.com/apps/$APP/formation \
            -d "{\"updates\":[{\"type\":\"web\",\"docker_image\":\"$IMAGE_ID\"}]}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer $HEROKU_API_KEY"
